name: Substrate CI

on:
  push:
    branches: [main]
    paths:
      - "core/**"
      - "storage/**"
      - "config/**"
      - "orchestrator/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/substrate-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "core/**"
      - "storage/**"
      - "config/**"
      - "orchestrator/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/substrate-ci.yml"

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
      - name: Run ruff linter
        run: ruff check core/ storage/ config/ orchestrator/ tests/

  type-check:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
      - name: Run mypy
        run: mypy core/ storage/ config/ orchestrator/

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
      - name: Run tests with coverage
        run: |
          python -m pytest tests/ \
            --cov=core \
            --cov=storage \
            --cov=config \
            --cov=orchestrator \
            --cov-report=term \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            -v
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  coverage-report:
    name: Coverage Summary
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
      - name: Generate coverage report
        run: |
          python -m pytest tests/ \
            --cov=core \
            --cov=storage \
            --cov=config \
            --cov=orchestrator \
            --cov-report=term-missing \
            -q
