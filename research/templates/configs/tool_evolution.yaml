# Tool Evolution Experiment
# Tests RQ3: How do tools diffuse through a population?
#
# Manipulation: tool_mutation_rate (0.01 vs 0.1) and initial_tools (1 vs 10)
# Key metrics: tool_adoption_rate (sigmoid: L, k, t0)
# Intervention: tool_ban at tick 10000
name: "tool_evolution_high_mutation"
description: "High tool mutation rate — rapid innovation expected"
random_seed: 42
max_ticks: 30000

world:
  width: 100
  height: 100
  resource_types: ["food", "mineral", "water"]
  resource_density: 0.3
  regeneration_rate: 0.01

agent:
  initial_population: 50
  cognitive_capacity: 10
  energy_efficiency: 0.5
  social_affinity: 0.3
  mutation_rate: 0.01

memory:
  episodic_capacity: 1000
  semantic_capacity: 500
  decay_rate: 0.001
  inheritance_fraction: 0.3

economy:
  initial_energy: 100.0
  energy_decay_rate: 0.01
  trade_enabled: true

tools:
  mutation_rate: 0.1          # HIGH — manipulation
  adoption_cost: 5.0
  initial_tools: 3

persistence:
  checkpoint_interval: 1000
  path: ""

interventions:
  - tick: 10000
    type: tool_ban
    params:
      tool_id: "tool_001"     # ban the most popular tool mid-run

telemetry:
  batch_size: 100
  flush_interval: 5.0
  metric_log_interval: 10

replication:
  num_replicates: 10
  seeds: [42, 142, 242, 342, 442, 542, 642, 742, 842, 942]
