# Social Dynamics Experiment
# Tests RQ2: Do cooperative strategies emerge without explicit rewards?
#
# Manipulation: social_affinity (0.1 vs 0.8)
# Key metrics: reputation_convergence, trade_network_density, communication_entropy
# Intervention: agent_removal at tick 5000 (tests reputation robustness)
name: "social_dynamics_high_affinity"
description: "High social affinity — agents strongly inclined to interact"
random_seed: 42
max_ticks: 20000

world:
  width: 100
  height: 100
  resource_types: ["food", "mineral", "water"]
  resource_density: 0.3
  regeneration_rate: 0.01

agent:
  initial_population: 50
  cognitive_capacity: 10
  energy_efficiency: 0.5
  social_affinity: 0.8        # HIGH — manipulation
  mutation_rate: 0.01

memory:
  episodic_capacity: 1000
  semantic_capacity: 500
  decay_rate: 0.001
  inheritance_fraction: 0.3

economy:
  initial_energy: 100.0
  energy_decay_rate: 0.01
  trade_enabled: true

tools:
  mutation_rate: 0.05
  adoption_cost: 5.0
  initial_tools: 5

persistence:
  checkpoint_interval: 1000
  path: ""

interventions:
  - tick: 5000
    type: agent_removal
    params:
      fraction: 0.2

telemetry:
  batch_size: 100
  flush_interval: 5.0
  metric_log_interval: 10

replication:
  num_replicates: 10
  seeds: [42, 142, 242, 342, 442, 542, 642, 742, 842, 942]
