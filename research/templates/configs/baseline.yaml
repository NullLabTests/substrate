# Baseline Experiment Configuration
# Establishes null-model metric distributions for all 7 research metrics.
# Every other experiment type compares its results against this baseline.
name: "baseline_experiment"
description: "Null-model baseline with default parameters and no interventions"
random_seed: 42
max_ticks: 10000

world:
  width: 100
  height: 100
  resource_types: ["food", "mineral", "water"]
  resource_density: 0.3
  regeneration_rate: 0.01

agent:
  initial_population: 50
  cognitive_capacity: 10
  energy_efficiency: 0.5
  social_affinity: 0.3
  mutation_rate: 0.01

memory:
  episodic_capacity: 1000
  semantic_capacity: 500
  decay_rate: 0.001
  inheritance_fraction: 0.3

economy:
  initial_energy: 100.0
  energy_decay_rate: 0.01
  trade_enabled: true

tools:
  mutation_rate: 0.05
  adoption_cost: 5.0
  initial_tools: 5

persistence:
  checkpoint_interval: 1000
  path: ""

interventions: []

telemetry:
  batch_size: 100
  flush_interval: 5.0
  metric_log_interval: 10

replication:
  num_replicates: 10
  seeds: [42, 142, 242, 342, 442, 542, 642, 742, 842, 942]
